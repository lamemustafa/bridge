name: Bridge CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Determine bundle scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      bundle: ${{ steps.scope.outputs.bundle }}
      native: ${{ steps.scope.outputs.native }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo 'bundle=true' >> "$GITHUB_OUTPUT"
            echo 'native=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
          else
            base="$BEFORE_SHA"
          fi

          # A new branch has no useful predecessor. Keep the conservative path.
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            echo 'bundle=true' >> "$GITHUB_OUTPUT"
            echo 'native=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$GITHUB_SHA")"
          if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/ci\.yml|\.github/actions/setup-windows-native/|rust-toolchain\.toml|src-tauri/)'; then
            echo 'native=true' >> "$GITHUB_OUTPUT"
          else
            echo 'native=false' >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/ci\.yml|\.github/actions/setup-windows-native/|package\.json|pnpm-lock\.yaml|\.node-version|vite\.config\.ts|tsconfig\.json|postcss\.config\.js|index\.html|src/|src-tauri/(src/|crates/|Cargo\.lock|Cargo\.toml|.*/Cargo\.toml|tauri\.conf\.json|build\.rs|icons/)|LICENSE$|NOTICE$|THIRD_PARTY_LICENSES\.txt$|THIRD_PARTY_LICENSES_RUST\.txt$|scripts/(check-license-metadata\.mjs|check-dependency-inventory\.mjs|check-windows-bundle-resources\.ps1|check-macos-bundle-resources\.mjs)$)'; then
            echo 'bundle=true' >> "$GITHUB_OUTPUT"
          else
            echo 'bundle=false' >> "$GITHUB_OUTPUT"
          fi

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm run license:check
      - run: corepack pnpm run build

  rust-format:
    name: Rust format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.0
          components: rustfmt
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: node scripts/check-dependency-inventory.mjs --rust

  tally-portable:
    name: Tally portable core
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
      - name: Test portable Tally truth layer
        working-directory: src-tauri
        run: >-
          cargo test --locked
          -p bridge-tally-canonical
          -p bridge-tally-compatibility
          -p bridge-tally-core
          -p bridge-tally-incremental
          -p bridge-tally-live-read
          -p bridge-tally-observability
          -p bridge-tally-protocol
          -p bridge-tally-qualification
          -p bridge-tally-read-transport
          -p bridge-tally-runtime
          -p bridge-tally-transport
          -p bridge-tally-write
          -p tally-protocol-simulator
      - name: Test disabled protocol evidence features
        working-directory: src-tauri
        run: >-
          cargo test --locked -p bridge-tally-protocol
          --features jsonex-parser,jsonex-request-builder,india-tax-observation-parser,bills-payments-observation-parser,bills-native-outstandings-probe
      - name: Test sealed canary payload capsule
        working-directory: src-tauri
        run: >-
          cargo test --locked -p bridge-tally-write
          --features fixture-canary-dispatch-seam
      - name: Test isolated native outstandings qualification path
        working-directory: src-tauri
        run: |
          cargo test --locked -p bridge-tally-compatibility --features bills-native-outstandings-probe-receipt
          cargo test --locked -p bridge-tally-read-transport --features bills-native-outstandings-probe-transport
          cargo test --locked -p bridge-tally-live-read --features bills-native-outstandings-probe-runner -- --test-threads=1
      - name: Lint portable Tally truth layer
        working-directory: src-tauri
        run: >-
          cargo clippy --locked
          -p bridge-tally-canonical
          -p bridge-tally-compatibility
          -p bridge-tally-core
          -p bridge-tally-incremental
          -p bridge-tally-live-read
          -p bridge-tally-observability
          -p bridge-tally-protocol
          -p bridge-tally-qualification
          -p bridge-tally-read-transport
          -p bridge-tally-runtime
          -p bridge-tally-transport
          -p bridge-tally-write
          -p tally-protocol-simulator
          --all-targets -- -D warnings
      - name: Lint disabled protocol evidence features
        working-directory: src-tauri
        run: >-
          cargo clippy --locked -p bridge-tally-protocol
          --features jsonex-parser,jsonex-request-builder,india-tax-observation-parser,bills-payments-observation-parser,bills-native-outstandings-probe
          --all-targets -- -D warnings
      - name: Lint sealed canary payload capsule
        working-directory: src-tauri
        run: >-
          cargo clippy --locked -p bridge-tally-write
          --features fixture-canary-dispatch-seam
          -- -D warnings
      - name: Lint isolated native outstandings qualification path
        working-directory: src-tauri
        run: |
          cargo clippy --locked -p bridge-tally-compatibility --features bills-native-outstandings-probe-receipt --all-targets -- -D warnings
          cargo clippy --locked -p bridge-tally-read-transport --features bills-native-outstandings-probe-transport --all-targets -- -D warnings
          cargo clippy --locked -p bridge-tally-live-read --features bills-native-outstandings-probe-runner --all-targets -- -D warnings
      - name: Produce parser-only synthetic qualification smoke receipt
        working-directory: src-tauri
        run: >-
          cargo run --locked --release -p bridge-tally-qualification --
          run ci-smoke target/tally-qualification-smoke.json 7 3
      - name: Enforce exact Tally compatibility claims
        working-directory: src-tauri
        run: >-
          cargo run --locked -p bridge-tally-compatibility --
          gate
          ../docs/tally/compatibility/compatibility-matrix.json
          ../docs/tally/compatibility/compatibility-surface.json
          ../docs/tally/compatibility/trusted-evidence-keys.json
          ../docs/tally/compatibility/evidence
          ..
      - name: Reject generated Tally matrix drift
        working-directory: src-tauri
        run: >-
          cargo run --locked -p bridge-tally-compatibility --
          check-matrix-markdown
          ../docs/tally/compatibility/compatibility-matrix.json
          ../docs/tally/support-matrix.md
      - name: Enforce no-write live-read dependency boundary
        run: node scripts/check-tally-live-read-boundary.mjs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tally-parser-qualification-smoke
          path: src-tauri/target/tally-qualification-smoke.json
          if-no-files-found: error
          retention-days: 7

  native:
    name: Native checks (${{ matrix.os }})
    needs: changes
    # Rust/Tauri changes always receive Windows and macOS coverage on PRs. The
    # check is deliberately skipped only for frontend- and documentation-only PRs.
    if: github.event_name != 'pull_request' || needs.changes.outputs.native == 'true'
    runs-on: ${{ matrix.os }}
    # Windows native provisioning and a cold Rust workspace build can consume
    # most of the validation budget; reserve time for mandatory cache cleanup
    # after all compile, test, and lint gates have completed.
    timeout-minutes: 35
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
      - name: Set up Windows native prerequisites
        id: windows-native-prerequisites
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-windows-native
        with:
          save-cache: true
      - name: Record Windows prerequisite cache state
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Windows native prerequisites'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Strawberry Perl cache hit: `${{ steps.windows-native-prerequisites.outputs.cache-hit }}`'
      - run: cargo check --locked --manifest-path src-tauri/Cargo.toml --workspace
      - name: Check sealed canary runtime dispatch feature
        working-directory: src-tauri
        run: >-
          cargo check --locked -p bridge --lib
          --features fixture-canary-runtime-dispatch
      - name: Test sealed canary runtime dispatch feature
        working-directory: src-tauri
        run: >-
          cargo test --locked -p bridge --lib
          --features fixture-canary-runtime-dispatch
          sealed
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml --workspace
      - name: Test isolated native outstandings qualification feature
        working-directory: src-tauri
        run: >-
          cargo test --locked -p bridge-tally-live-read
          --features bills-native-outstandings-probe-runner
          --all-targets -- --test-threads=1
      - run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --workspace --all-targets -- -D warnings
      - name: Lint sealed canary runtime dispatch feature
        working-directory: src-tauri
        run: >-
          cargo clippy --locked -p bridge --lib
          --features fixture-canary-runtime-dispatch
          -- -D warnings
      - name: Lint isolated native outstandings qualification feature
        working-directory: src-tauri
        run: >-
          cargo clippy --locked -p bridge-tally-live-read
          --features bills-native-outstandings-probe-runner
          --all-targets -- -D warnings

  bundle-smoke:
    name: Bundle smoke (${{ matrix.os }})
    needs: changes
    # Bundle output is validated for packaging-relevant pull requests and every
    # master/manual run. Rust/Tauri PRs retain the native platform matrix above.
    if: github.event_name != 'pull_request' || needs.changes.outputs.bundle == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
      - name: Set up Windows native prerequisites
        id: windows-bundle-prerequisites
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-windows-native
      - name: Record Windows prerequisite cache state
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Windows native prerequisites'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Strawberry Perl cache hit: `${{ steps.windows-bundle-prerequisites.outputs.cache-hit }}`'
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm run license:all
      - run: corepack pnpm run tauri:build
      - name: Verify Windows installer legal resources
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/check-windows-bundle-resources.ps1
      - name: Verify macOS app legal resources
        if: runner.os == 'macOS'
        run: node scripts/check-macos-bundle-resources.mjs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-bundle-smoke-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 7

  required-checks:
    name: Required checks
    # Always runs so it can report a single, stable required status for branch
    # protection. Passes when every upstream job either succeeded or was
    # legitimately skipped (e.g. native/bundle skip on docs-only PRs), and fails
    # if any upstream job failed or was cancelled. Point branch protection at
    # this context instead of the individual matrix jobs so docs-only PRs are
    # not blocked by skipped native/bundle checks.
    if: ${{ always() }}
    needs: [changes, frontend, rust-format, tally-portable, native, bundle-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Verify no required job failed
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          printf '%s\n' "$NEEDS_JSON"
          failed="$(
            printf '%s' "$NEEDS_JSON" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(' '.join(k for k,v in d.items() if v.get('result') in ('failure','cancelled')))"
          )"
          if [[ -n "$failed" ]]; then
            echo "Required jobs did not pass: $failed"
            exit 1
          fi
          echo "All required jobs succeeded or were legitimately skipped."

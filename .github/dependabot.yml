version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    target-branch: master
    open-pull-requests-limit: 5
    groups:
      frontend-production:
        dependency-type: production
      frontend-development:
        dependency-type: development

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    target-branch: master
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: master
    open-pull-requests-limit: 5
